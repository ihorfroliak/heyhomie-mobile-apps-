name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Domain & API tests
        run: npm test
      - name: Type-check (domain / api / analytics)
        run: npm run typecheck
      - name: App-screen sanity (brackets + design glyphs)
        run: npm run check:apps
